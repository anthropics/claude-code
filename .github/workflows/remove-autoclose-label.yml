name: "Remove Lifecycle Labels on Human Activity"

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  remove-lifecycle-labels:
    # Any human activity resets the inactivity-only lifecycle labels.
    if: |
      github.event.issue.state == 'open' &&
      !github.event.issue.pull_request &&
      github.event.comment.user.type != 'Bot' &&
      (contains(github.event.issue.labels.*.name, 'stale') ||
       contains(github.event.issue.labels.*.name, 'autoclose'))
    runs-on: ubuntu-latest
    steps:
      - name: Remove activity-based lifecycle labels
        uses: actions/github-script@v7
        with:
          script: |
            const currentLabels = (context.payload.issue.labels ?? []).map(
              label => typeof label === 'string' ? label : label.name
            );
            const labelsToRemove = ['stale', 'autoclose'];
            for (const name of labelsToRemove) {
              if (!currentLabels.includes(name)) continue;

              console.log(`Removing ${name} label from issue #${context.issue.number} due to new human comment from ${context.payload.comment.user.login}`);
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name
                });
                console.log(`Successfully removed ${name} label from issue #${context.issue.number}`);
              } catch (error) {
                // Concurrent comments may race to remove the same label.
                if (error.status === 404) {
                  console.log(`${name} label was already removed from issue #${context.issue.number}`);
                } else {
                  throw error;
                }
              }
            }
