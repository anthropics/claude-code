name: Update Changelog Feed

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Regenerate feed.xml
        run: python3 scripts/generate-feed.py

      - name: Commit and push updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          if git diff --cached --quiet; then
            echo "feed.xml unchanged, skipping commit"
          else
            git commit -m "chore: Update feed.xml for ${{ github.event.release.tag_name }}"
            git push
          fi
