name: Claude Issue Dedupe
description: Automatically dedupe GitHub issues using Claude Code
on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process for duplicate detection'
        required: true
        type: string

jobs:
  claude-dedupe-issues:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    concurrency:
      group: issue-dedupe-${{ github.event.issue.number || inputs.issue_number }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve trusted issue context
        id: issue-context
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
        run: |
          if ! [[ "$ISSUE_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "Invalid issue number" >&2
            exit 1
          fi
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code slash command
        id: dedupe
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_CODE_SCRIPT_CAPS: '{"comment-on-duplicates.sh":1}'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_non_write_users: "*"
          prompt: "/dedupe ${{ github.repository }}/issues/${{ steps.issue-context.outputs.issue_number }}"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-sonnet-4-5-20250929"

      - name: Verify duplicate comment was added
        id: duplicate-comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue-context.outputs.issue_number }}
          STARTED_AT: ${{ steps.issue-context.outputs.started_at }}
          REPO: ${{ github.repository }}
          DEDUPE_BOT_LOGIN: github-actions[bot]
        run: |
          if gh api --paginate --slurp \
            "repos/$REPO/issues/$ISSUE_NUMBER/comments?per_page=100" \
            | jq -e --arg started_at "$STARTED_AT" --arg bot "$DEDUPE_BOT_LOGIN" \
              'flatten | any(.[];
                (.created_at >= $started_at) and
                (.user.type == "Bot") and
                (.user.login == $bot) and
                (.body | contains("<!-- claude-dedupe-report -->"))
              )' \
            >/dev/null; then
            echo "added=true" >> "$GITHUB_OUTPUT"
          else
            echo "added=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log duplicate comment event to Statsig
        if: steps.duplicate-comment.outputs.added == 'true'
        env:
          STATSIG_API_KEY: ${{ secrets.STATSIG_API_KEY }}
          ISSUE_NUMBER: ${{ steps.issue-context.outputs.issue_number }}
          REPO: ${{ github.repository }}
          TRIGGERED_BY: ${{ github.event_name }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: |
          if [ -z "$STATSIG_API_KEY" ]; then
            echo "STATSIG_API_KEY not found, skipping Statsig logging"
            exit 0
          fi

          EVENT_PAYLOAD=$(jq -n \
            --arg issue_number "$ISSUE_NUMBER" \
            --arg repo "$REPO" \
            --arg triggered_by "$TRIGGERED_BY" \
            --arg workflow_run_id "$WORKFLOW_RUN_ID" \
            '{
              events: [{
                eventName: "github_duplicate_comment_added",
                value: 1,
                metadata: {
                  repository: $repo,
                  issue_number: ($issue_number | tonumber),
                  triggered_by: $triggered_by,
                  workflow_run_id: $workflow_run_id
                },
                time: (now * 1000 | floor)
              }]
            }')

          curl --fail-with-body --silent --show-error --retry 3 \
            -X POST https://events.statsigapi.net/v1/log_event \
            -H "Content-Type: application/json" \
            -H "STATSIG-API-KEY: ${STATSIG_API_KEY}" \
            -d "$EVENT_PAYLOAD"
          echo "Logged duplicate comment event for issue #${ISSUE_NUMBER}"
