name: Python package

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Lint Mythos runtime surface
        run: |
          flake8 \
            ethos_aegis/mythos_runtime/budget.py \
            ethos_aegis/mythos_runtime/drift.py \
            ethos_aegis/mythos_runtime/memory.py \
            ethos_aegis/mythos_runtime/swd.py \
            ethos_aegis/veriflow/ckan_adapter.py \
            ethos_aegis/veriflow/immune_system.py \
            tests/test_mythos_runtime.py \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics
          flake8 \
            ethos_aegis/mythos_runtime/budget.py \
            ethos_aegis/mythos_runtime/drift.py \
            ethos_aegis/mythos_runtime/memory.py \
            ethos_aegis/mythos_runtime/swd.py \
            ethos_aegis/veriflow/ckan_adapter.py \
            ethos_aegis/veriflow/immune_system.py \
            tests/test_mythos_runtime.py \
            --count \
            --max-complexity=10 \
            --max-line-length=127 \
            --statistics
      - name: Test Mythos runtime
        run: |
          pytest tests/test_mythos_runtime.py -q
