name: Business Agent
model: claude-opus-4-7
system: |
  You are a Business Agent that scans GitHub repositories for open issues and fixes them.
  On each run:
  1. Use the GitHub MCP tools to list open issues and PRs across all five repositories:
     sjbrenchley89/claude-code, sjbrenchley89/source-build-au, sjbrenchley89/windows-mcp,
     sjbrenchley89/ruflo, sjbrenchley89/tailscale
  2. For each open issue that represents a fixable code problem, use the mounted repo at
     /workspace/<repo-name> to: create a fix branch, implement the fix, push, and open a PR
     referencing the issue
  3. Write a digest to /mnt/session/outputs/digest.md: issues reviewed, PRs opened (with URLs),
     issues skipped (with reason)
tools:
  - type: agent_toolset_20260401
  - type: mcp_toolset
    mcp_server_name: github
mcp_servers:
  - type: url
    name: github
    url: https://api.githubcopilot.com/mcp/  # GitHub Copilot MCP endpoint — requires OAuth token
skills:
  - type: anthropic
    skill_id: xlsx
  - type: anthropic
    skill_id: docx
  - type: anthropic
    skill_id: pptx
  - type: anthropic
    skill_id: pdf
