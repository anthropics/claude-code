// ─── Utils ──────────────────────────────────────────────────────────────────
function relativeTime(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'agora';
  if (m < 60) return `${m}min atrás`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h atrás`;
  return `${Math.floor(h / 24)}d atrás`;
}

function slugify(t) {
  return t.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

function cn(...args) { return args.filter(Boolean).join(' '); }

// ─── Auth Hook ───────────────────────────────────────────────────────────────
async function fetchRoles(userId) {
  const { data } = await sb.from('user_roles').select('role').eq('user_id', userId).in('role',['admin','moderator']);
  return data?.map(r => r.role) ?? [];
}

function useAuth() {
  const [user, setUser] = useState(null);
  const [role, setRole] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    // Load user AND roles before clearing the loading gate so AdminPage
    // never flashes "Acesso restrito" for a logged-in admin.
    sb.auth.getUser().then(async ({ data }) => {
      const u = data.user ?? null;
      setUser(u);
      if (u) setRole(await fetchRoles(u.id));
      setLoading(false);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange(async (_e, session) => {
      const u = session?.user ?? null;
      setUser(u);
      setRole(u ? await fetchRoles(u.id) : null);
    });
    return () => subscription.unsubscribe();
  }, []);

  const isAdmin = role?.includes('admin') || role?.includes('moderator');
  return { user, role, isAdmin, loading };
}

// ─── Router ─────────────────────────────────────────────────────────────────
function useRoute() {
  const [hash, setHash] = useState(location.hash || '#/');
  useEffect(() => {
    const h = () => setHash(location.hash || '#/');
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);
  return hash;
}

function navigate(path) { location.hash = path; }

function Avatar({ name, size = 'md' }) {
  const sz = size === 'sm' ? 'w-7 h-7 text-xs' : 'w-9 h-9 text-sm';
  const initials = (name || '?').split(' ').map(n => n[0]).slice(0,2).join('').toUpperCase();
  return React.createElement('div', {
    className: cn('rounded-full bg-indigo-500 text-white flex items-center justify-center font-medium shrink-0', sz)
  }, initials);
}

// ─── Login Page ───────────────────────────────────────────────────────────────
function LoginPage() {
  const [email, setEmail] = useState('');
  const [sent, setSent] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  async function submit(e) {
    e.preventDefault();
    setLoading(true); setError(null);
    const redirectTo = location.href.split('#')[0];
    const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: redirectTo } });
    setLoading(false);
    if (error) setError(error.message);
    else setSent(true);
  }

  if (sent) return React.createElement('div', { className: 'min-h-screen flex items-center justify-center p-4' },
    React.createElement('div', { className: 'text-center max-w-sm' },
      React.createElement('div', { className: 'text-5xl mb-4' }, '📬'),
      React.createElement('h2', { className: 'text-xl font-semibold mb-2' }, 'Verifique seu email'),
      React.createElement('p', { className: 'text-zinc-500 text-sm' }, `Enviamos um link para ${email}. Clique nele para entrar.`)
    )
  );

  return React.createElement('div', { className: 'min-h-screen flex items-center justify-center p-4' },
    React.createElement('form', { onSubmit: submit, className: 'w-full max-w-sm bg-white rounded-2xl border border-zinc-200 p-8 shadow-sm' },
      React.createElement('div', { className: 'text-3xl text-center mb-6' }, '💬'),
      React.createElement('h1', { className: 'text-xl font-bold mb-1 text-center' }, 'Entrar'),
      React.createElement('p', { className: 'text-sm text-zinc-500 text-center mb-6' }, 'Receba um link de acesso no email'),
      error && React.createElement('p', { className: 'text-red-600 text-sm mb-4 bg-red-50 rounded-lg px-3 py-2' }, error),
      React.createElement('label', { className: 'block text-sm font-medium text-zinc-700 mb-1' }, 'Email'),
      React.createElement('input', {
        type: 'email', required: true, value: email, onChange: e => setEmail(e.target.value),
        placeholder: 'seu@email.com',
        className: 'w-full border border-zinc-200 rounded-lg px-3 py-2.5 text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-500'
      }),
      React.createElement('button', {
        type: 'submit', disabled: loading,
        className: 'w-full bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white py-2.5 rounded-lg text-sm font-medium transition-colors'
      }, loading ? 'Enviando...' : 'Enviar link de acesso')
    )
  );
}

// ─── Themes Page ──────────────────────────────────────────────────────────────
function ThemesPage() {
  const [themes, setThemes] = useState([]);

  useEffect(() => {
    Promise.all([

      sb.from('debates').select('theme_id')
    ]).then(([{ data: t }, { data: d }]) => {
      setThemes(t ?? []);
      const c = {};
      (d ?? []).forEach(row => { c[row.theme_id] = (c[row.theme_id] || 0) + 1; });
      setCounts(c);
      setLoading(false);
    }).catch(() => setLoading(false));
  }, []);

  if (loading) return React.createElement('div', { className: 'max-w-5xl mx-auto px-4 py-12 text-center text-zinc-400' }, 'Carregando...');

  return React.createElement('div', { className: 'max-w-5xl mx-auto px-4 py-8' },
    React.createElement('h1', { className: 'text-2xl font-bold mb-2' }, 'Temas de Debate'),
    React.createElement('p', { className: 'text-zinc-500 mb-8' }, 'Escolha um tema e participe da conversa.'),
    themes.length === 0
      ? React.createElement('p', { className: 'text-zinc-400 text-center py-16' }, 'Nenhum tema ainda. Acesse /admin para criar.')

          },
            React.createElement('div', {
              className: 'w-10 h-10 rounded-xl mb-4 flex items-center justify-center',
              style: { backgroundColor: t.color + '20' }
            },
              React.createElement('div', { className: 'w-4 h-4 rounded-full', style: { backgroundColor: t.color } })
            ),
            React.createElement('h2', { className: 'font-semibold group-hover:text-indigo-600 transition-colors' }, t.name),
            t.description && React.createElement('p', { className: 'text-sm text-zinc-500 mt-1 line-clamp-2' }, t.description),

// ─── Debates Page ─────────────────────────────────────────────────────────────
function DebatesPage({ slug }) {
  const [theme, setTheme] = useState(null);
  const [debates, setDebates] = useState([]);
  const [msgCounts, setMsgCounts] = useState({});
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    sb.from('debate_themes').select('*').eq('slug', slug).single()
      .then(({ data: t }) => {
        if (!t) { navigate('#/'); return; }
        setTheme(t);
        return Promise.all([
          sb.from('debates').select('*').eq('theme_id', t.id).order('created_at', { ascending: false }),
          sb.from('messages').select('debate_id').is('deleted_at', null).eq('is_hidden', false)
        ]);
      }).then(res => {
        if (!res) return;
        const [{ data: d }, { data: m }] = res;
        setDebates(d ?? []);
        const c = {};
        (m ?? []).forEach(row => { c[row.debate_id] = (c[row.debate_id] || 0) + 1; });
        setMsgCounts(c);
        setLoading(false);
      }).catch(() => setLoading(false));
  }, [slug]);

  if (loading) return React.createElement('div', { className: 'max-w-3xl mx-auto px-4 py-12 text-center text-zinc-400' }, 'Carregando...');

  const STATUS = { open: { label: 'Ao vivo', cls: 'bg-green-100 text-green-700' }, closed: { label: 'Encerrado', cls: 'bg-zinc-100 text-zinc-500' }, archived: { label: 'Arquivado', cls: 'bg-amber-100 text-amber-700' } };
  const open = debates.filter(d => d.status === 'open');
  const others = debates.filter(d => d.status !== 'open');

  return React.createElement('div', { className: 'max-w-3xl mx-auto px-4 py-8' },
    React.createElement('div', { className: 'flex items-center gap-3 mb-6' },
      React.createElement('a', { href: '#/', className: 'text-zinc-400 hover:text-zinc-700 text-lg' }, '←'),
      theme && React.createElement('div', { className: 'w-3 h-3 rounded-full', style: { backgroundColor: theme.color } }),
      React.createElement('h1', { className: 'font-bold text-xl' }, theme?.name)
    ),
    open.length > 0 && React.createElement('div', { className: 'mb-6' },
      React.createElement('p', { className: 'text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-3' }, 'Ao vivo agora'),
      open.map(d => DebateCard(d, theme?.slug, msgCounts, STATUS))
    ),
    others.length > 0 && React.createElement('div', null,
      React.createElement('p', { className: 'text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-3' }, 'Histórico'),
      others.map(d => DebateCard(d, theme?.slug, msgCounts, STATUS))
    ),
    debates.length === 0 && React.createElement('p', { className: 'text-zinc-400 text-center py-16 text-sm' }, 'Nenhum debate ainda.')
  );
}

function DebateCard(d, themeSlug, msgCounts, STATUS) {
  const s = STATUS[d.status] || STATUS.closed;
  return React.createElement('a', {
    key: d.id, href: `#/debate/${d.id}`,
    className: 'block rounded-xl border border-zinc-200 bg-white p-5 hover:shadow-md hover:border-zinc-300 transition-all mb-3 group'
  },
    React.createElement('div', { className: 'flex items-start justify-between gap-4 mb-2' },
      React.createElement('h3', { className: 'font-medium group-hover:text-indigo-600 transition-colors' }, d.title),
      React.createElement('span', { className: cn('text-xs px-2 py-0.5 rounded-full font-medium shrink-0', s.cls) },
        d.status === 'open' && React.createElement('span', { className: 'inline-block w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse-dot mr-1.5 align-middle' }),
        s.label
      )
    ),
    d.description && React.createElement('p', { className: 'text-sm text-zinc-500 line-clamp-2 mb-2' }, d.description),
    React.createElement('p', { className: 'text-xs text-zinc-400' }, `💬 ${msgCounts[d.id] || 0} mensagens`)
  );
}

// ─── Debate Room ──────────────────────────────────────────────────────────────
function DebateRoomPage({ debateId, user, isAdmin }) {
  const [debate, setDebate] = useState(null);
  const [theme, setTheme] = useState(null);
  const [messages, setMessages] = useState([]);
  const [reactions, setReactions] = useState([]);
  const [content, setContent] = useState('');
  const [sending, setSending] = useState(false);
  const [loading, setLoading] = useState(true);
  const bottomRef = useRef(null);
  const channelRef = useRef(null);

  useEffect(() => {
    async function load() {
      const { data: d } = await sb.from('debates').select('*, debate_themes(*)').eq('id', debateId).single();
      if (!d) { navigate('#/'); return; }
      setDebate(d); setTheme(d.debate_themes);

      const { data: msgs } = await sb.from('messages')
        .select('*, profiles(id, display_name, avatar_url)')
        .eq('debate_id', debateId).eq('is_hidden', false).is('deleted_at', null)
        .order('created_at', { ascending: true }).limit(100);
      setMessages(msgs ?? []);

      const ids = (msgs ?? []).map(m => m.id);
      if (ids.length) {
        const { data: r } = await sb.from('reactions').select('*').in('message_id', ids);
        setReactions(r ?? []);
      }
      setLoading(false);
    }
    load();
  }, [debateId]);

  useEffect(() => {
    // Depend on debateId (the prop), not debate?.id (derived state), so the old
    // channel is unsubscribed synchronously when the user navigates away — before
    // any new messages can be appended to the wrong debate's list.
    const channel = sb.channel(`debate:${debateId}`)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `debate_id=eq.${debateId}` },
        async payload => {
          // Skip messages that are already hidden at insert time (e.g. spam triggers)
          if (payload.new.is_hidden || payload.new.deleted_at) return;
          const { data: profile } = await sb.from('profiles').select('*').eq('id', payload.new.user_id).single();
          setMessages(prev => [...prev, { ...payload.new, profiles: profile }]);
        }
      )
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'messages', filter: `debate_id=eq.${debateId}` },
        payload => {
          if (payload.new.is_hidden || payload.new.deleted_at) setMessages(prev => prev.filter(m => m.id !== payload.new.id));
          else setMessages(prev => prev.map(m => m.id === payload.new.id ? { ...m, ...payload.new } : m));
        }
      )
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'reactions' },
        payload => setReactions(prev => prev.some(r => r.id === payload.new.id) ? prev : [...prev, payload.new])
      )
      .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'reactions' },
        payload => setReactions(prev => prev.filter(r => r.id !== payload.old.id))
      )
      .subscribe();
    channelRef.current = channel;
    return () => channel.unsubscribe();
  }, [debateId]);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages.length]);

  async function send() {
    if (!content.trim() || sending) return;
    setSending(true);
    await sb.from('messages').insert({ debate_id: debateId, user_id: user.id, content: content.trim() });
    setContent('');
    setSending(false);
  }

  async function toggleReaction(messageId, type) {
    if (!user) return;
    const existing = reactions.find(r => r.message_id === messageId && r.user_id === user.id && r.type === type);
    if (existing) {
      // Optimistically remove before awaiting so a rapid second click
      // sees the updated state and won't issue a duplicate INSERT.
      setReactions(prev => prev.filter(r => r.id !== existing.id));
      await sb.from('reactions').delete().eq('id', existing.id);
    } else {
      const tempId = `tmp-${Date.now()}`;
      setReactions(prev => [...prev, { id: tempId, message_id: messageId, user_id: user.id, type }]);
      const { error } = await sb.from('reactions').insert({ message_id: messageId, user_id: user.id, type });
      if (error) setReactions(prev => prev.filter(r => r.id !== tempId));
    }
  }

  async function hideMsg(id) {
    await sb.from('messages').update({ is_hidden: true }).eq('id', id);
  }

  if (loading) return React.createElement('div', { className: 'h-screen flex items-center justify-center text-zinc-400' }, 'Carregando...');

  const isOpen = debate?.status === 'open';

  return React.createElement('div', { className: 'h-screen flex flex-col' },
    // Header
    React.createElement('div', { className: 'border-b border-zinc-200 bg-white px-4 py-3 flex items-center gap-3' },
      React.createElement('a', { href: `#/tema/${theme?.slug}`, className: 'text-zinc-400 hover:text-zinc-700 text-lg' }, '←'),
      React.createElement('div', { className: 'flex-1 min-w-0' },
        theme && React.createElement('div', { className: 'flex items-center gap-1.5 text-xs text-zinc-500' },
          React.createElement('div', { className: 'w-2.5 h-2.5 rounded-full', style: { backgroundColor: theme.color } }),
          theme.name
        ),
        React.createElement('h1', { className: 'font-semibold text-sm truncate' }, debate?.title)
      ),
      React.createElement('span', {
        className: cn('text-xs px-2 py-0.5 rounded-full font-medium', isOpen ? 'bg-green-100 text-green-700' : 'bg-zinc-100 text-zinc-500')
      },
        isOpen && React.createElement('span', { className: 'inline-block w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse-dot mr-1 align-middle' }),
        isOpen ? 'Ao vivo' : 'Encerrado'
      )
    ),

    // Messages
    React.createElement('div', { className: 'flex-1 overflow-y-auto py-4 space-y-1 bg-zinc-50' },
      messages.length === 0 && React.createElement('p', { className: 'text-center text-zinc-400 text-sm py-12' }, 'Nenhuma mensagem. Seja o primeiro!'),
      messages.map(msg => {
        const isOwn = msg.user_id === user?.id;
        const msgReactions = reactions.filter(r => r.message_id === msg.id);
        const counts = { like: 0, insightful: 0, disagree: 0 };
        const userReacts = [];
        msgReactions.forEach(r => { counts[r.type] = (counts[r.type] || 0) + 1; if (r.user_id === user?.id) userReacts.push(r.type); });

        return React.createElement('div', {
          key: msg.id,
          className: cn('flex gap-2 px-4 py-1.5 group', isOwn && 'flex-row-reverse')
        },
          React.createElement(Avatar, { name: msg.profiles?.display_name, size: 'sm' }),
          React.createElement('div', { className: cn('flex flex-col max-w-[72%]', isOwn && 'items-end') },
            React.createElement('div', { className: 'flex items-baseline gap-2 mb-0.5' },
              React.createElement('span', { className: 'text-xs font-medium text-zinc-600' }, msg.profiles?.display_name || 'Usuário'),
              React.createElement('span', { className: 'text-[10px] text-zinc-400' }, relativeTime(msg.created_at))
            ),
            React.createElement('div', {
              className: cn('msg-bubble rounded-2xl px-4 py-2 text-sm',
                isOwn ? 'bg-indigo-600 text-white rounded-tr-sm' : 'bg-white text-zinc-900 shadow-sm rounded-tl-sm border border-zinc-100')
            }, msg.content),
            // Reactions
            React.createElement('div', { className: 'flex items-center gap-1 mt-1' },
              [['like','👍'],['insightful','💡'],['disagree','👎']].map(([type, emoji]) =>
                React.createElement('button', {
                  key: type, disabled: !user,
                  onClick: () => toggleReaction(msg.id, type),
                  className: cn('flex items-center gap-0.5 px-1.5 py-0.5 rounded-full text-xs transition-colors',
                    userReacts.includes(type) ? 'bg-indigo-100 text-indigo-700' : 'text-zinc-400 hover:bg-zinc-100',
                    !user && 'cursor-default')
                }, emoji, counts[type] > 0 && React.createElement('span', { className: 'ml-0.5' }, counts[type]))
              ),
              isAdmin && React.createElement('button', {
                onClick: () => hideMsg(msg.id),
                className: 'ml-2 opacity-0 group-hover:opacity-100 text-xs text-red-400 hover:text-red-600 transition-all'
              }, 'ocultar')
            )
          )
        );
      }),
      React.createElement('div', { ref: bottomRef })
    ),

    // Composer
    isOpen && user
      ? React.createElement('div', { className: 'border-t border-zinc-200 bg-white px-4 py-3' },
          React.createElement('div', { className: 'flex gap-2 items-end' },
            React.createElement('textarea', {
              value: content, onChange: e => setContent(e.target.value.slice(0, 2000)),
              onKeyDown: e => { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); send(); } },
              placeholder: 'Sua mensagem... (Ctrl+Enter para enviar)',
              rows: 1,
              className: 'flex-1 resize-none rounded-xl border border-zinc-200 bg-zinc-50 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 max-h-32',
              style: { height: 'auto' },
              onInput: e => { e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px'; }
            }),
            React.createElement('button', {
              onClick: send, disabled: !content.trim() || sending,
              className: 'bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white rounded-xl p-2.5 transition-colors'
            }, sending ? '...' : '→')
          )
        )
      : isOpen && !user
        ? React.createElement('div', { className: 'border-t border-zinc-200 bg-zinc-50 px-6 py-4 text-center text-sm text-zinc-500' },
            React.createElement('a', { href: '#/login', className: 'text-indigo-600 font-medium hover:underline' }, 'Faça login'),

        : React.createElement('div', { className: 'border-t border-zinc-200 bg-zinc-50 px-6 py-4 text-center text-sm text-zinc-400' },

}

// ─── Admin Page ───────────────────────────────────────────────────────────────
const COLORS = ['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#0ea5e9','#ec4899','#14b8a6'];

function StatCard({ label, value, sub }) {
  return React.createElement('div', { className: 'bg-white border border-zinc-200 rounded-xl px-5 py-4' },
    React.createElement('p', { className: 'text-xs text-zinc-400 mb-1' }, label),
    React.createElement('p', { className: 'text-2xl font-bold text-zinc-900' }, value ?? '—'),
    sub && React.createElement('p', { className: 'text-xs text-zinc-400 mt-0.5' }, sub)
  );
}

function AdminPage({ user, isAdmin }) {
  const [tab, setTab] = useState('dashboard');
  const [flash, setFlash] = useState(null);
  const [saving, setSaving] = useState(false);

  // Dashboard
  const [stats, setStats] = useState(null);

  // Themes
  const [themes, setThemes] = useState([]);
  const [tName, setTName] = useState(''); const [tDesc, setTDesc] = useState(''); const [tColor, setTColor] = useState('#6366f1');

  // Debates
  const [debates, setDebates] = useState([]);
  const [dTheme, setDTheme] = useState(''); const [dTitle, setDTitle] = useState(''); const [dDesc, setDDesc] = useState('');

  // Users
  const [profiles, setProfiles] = useState([]);
  const [roleMap, setRoleMap] = useState({});

  // Moderation
  const [hiddenMsgs, setHiddenMsgs] = useState([]);

  function showFlash(type, text) {
    setFlash({ type, text });
    setTimeout(() => setFlash(null), 3500);
  }

  async function loadStats() {
    const [{ count: tc }, themes_data, { count: mc }, { count: uc }] = await Promise.all([
      sb.from('debate_themes').select('*', { count: 'exact', head: true }).eq('is_active', true),
      sb.from('debates').select('status'),
      sb.from('messages').select('*', { count: 'exact', head: true }).is('deleted_at', null).eq('is_hidden', false),
      sb.from('profiles').select('*', { count: 'exact', head: true }),
    ]);
    const d = themes_data.data ?? [];
    setStats({
      themes: tc ?? 0,
      debatesOpen: d.filter(r => r.status === 'open').length,
      debatesTotal: d.length,
      messages: mc ?? 0,
      users: uc ?? 0,
    });
  }

  async function loadThemes() {
    const { data } = await sb.from('debate_themes').select('*').order('created_at', { ascending: false });
    setThemes(data ?? []);
  }

  async function loadDebates() {
    const { data } = await sb.from('debates').select('*, debate_themes(name, color)').order('created_at', { ascending: false });
    setDebates(data ?? []);
  }

  async function loadUsers() {
    const [{ data: p }, { data: r }] = await Promise.all([
      sb.from('profiles').select('*').order('display_name'),
      sb.from('user_roles').select('*'),
    ]);
    setProfiles(p ?? []);
    const map = {};
    (r ?? []).forEach(row => { map[row.user_id] = map[row.user_id] ?? []; map[row.user_id].push(row.role); });
    setRoleMap(map);
  }

  async function loadHidden() {
    const { data } = await sb.from('messages')
      .select('*, profiles(display_name), debates(title, debate_themes(name))')
      .eq('is_hidden', true).is('deleted_at', null)

    setHiddenMsgs(data ?? []);
  }

  useEffect(() => {
    if (!isAdmin) return;
    loadStats(); loadThemes(); loadDebates();
  }, [isAdmin]);

    if (!isAdmin) return;

  async function toggleTheme(id, active) {

  async function deleteTheme(id, name) {

// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  const { user, isAdmin, loading } = useAuth();
  const hash = useRoute();

  // Handle magic link auth callback (token arrives in hash or query string)
  useEffect(() => {
    const h = location.hash;
    const q = location.search;
    if (h.includes('access_token') || h.includes('error_description') ||
        q.includes('code=') || q.includes('error=')) {
      sb.auth.getSession()
        .then(() => {
          history.replaceState(null, '', location.pathname);
          navigate('#/');
        })
        .catch(() => {
          // Even on failure, clean the auth fragment so the user isn't stuck
          // on an unrecognised route with token params in the URL bar.
          history.replaceState(null, '', location.pathname);
          navigate('#/login');
        });
    }
  }, []);

  if (loading) return React.createElement('div', { className: 'min-h-screen flex items-center justify-center text-zinc-400' }, 'A carregar...');

  // Parse route
  let page = React.createElement(ThemesPage);
  const path = hash.replace(/^#/, '') || '/';

  if (path === '/login') {
    page = React.createElement(LoginPage);
  } else if (path === '/admin') {
    page = React.createElement(AdminPage, { user, isAdmin });
  } else if (path.startsWith('/tema/')) {
    const slug = path.replace('/tema/', '');
    page = React.createElement(DebatesPage, { slug });
  } else if (path.startsWith('/debate/')) {
    const id = path.replace('/debate/', '');
    page = React.createElement(DebateRoomPage, { debateId: id, user, isAdmin });
  }

  const isChat = path.startsWith('/debate/');

  return React.createElement('div', { className: isChat ? 'h-screen flex flex-col' : 'min-h-screen' },
    !isChat && React.createElement(Header, { user, isAdmin }),
    isChat ? page : React.createElement('main', null, page)
  );
}

createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
