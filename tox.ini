[tox]
envlist = py39,py310,py311
skipsdist = true

[testenv]
deps =
    pytest>=7.0
    flake8>=6.0
commands =
    flake8 ethos_aegis/ tests/ \
        --count \
        --select=E9,F63,F7,F82 \
        --show-source \
        --statistics
    flake8 ethos_aegis/ tests/ \
        --count \
        --max-complexity=10 \
        --max-line-length=127 \
        --statistics
    pytest tests/ -q

[flake8]
max-line-length = 127
max-complexity = 10
exclude =
    .git,
    __pycache__,
    .tox,
    .venv,
    venv,
    dist,
    build
