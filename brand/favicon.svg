  <path d="M32 8 L51 16 L51 36 Q51 51 32 58 Q13 51 13 36 L13 16 Z"
        fill="#0D1117"/>
  <!-- Inner glow -->
  <path d="M32 8 L51 16 L51 28 Q51 28 32 32 Q13 28 13 28 L13 16 Z"
        fill="url(#fGlow)" opacity="0.5"/>

  <!-- Inner hexagon -->
  <polygon points="32,20 40,25 40,35 32,40 24,35 24,25"
           fill="none" stroke="#00E57A" stroke-width="1.8" opacity="0.9"/>

  <!-- Checkmark -->
  <polyline points="26,31 31,38 39,23"
            fill="none" stroke="#00E57A" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
