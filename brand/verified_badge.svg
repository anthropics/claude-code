<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" width="160" height="40" role="img" aria-label="Ethos Aegis Verified badge">
  <defs>
    <linearGradient id="vbBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1C2433;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect width="160" height="40" rx="20" fill="url(#vbBg)"/>
  <rect width="160" height="40" rx="20" fill="none" stroke="#00E57A" stroke-width="1.2" opacity="0.7"/>

  <!-- Shield icon (left) -->
  <g transform="translate(12, 6)">
    <path d="M14 2 L24 6 L24 18 Q24 26 14 30 Q4 26 4 18 L4 6 Z"
          fill="none" stroke="#00E57A" stroke-width="1.5" opacity="0.9"/>
    <path d="M14 4 L22 8 L22 18 Q22 24 14 28 Q6 24 6 18 L6 8 Z"
          fill="#0D1117"/>
    <!-- Checkmark inside shield -->
    <polyline points="10,16 13,20 19,11"
              fill="none" stroke="#00E57A" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Label: left part (dark) -->
  <rect x="40" y="0" width="60" height="40" rx="0" fill="#161B22"/>
  <rect x="40" y="0" width="1" height="40" fill="#00E57A" opacity="0.3"/>

  <!-- Label text -->
  <text x="70" y="25"
        font-family="'JetBrains Mono', monospace"
        font-size="11"
        font-weight="600"
        letter-spacing="1"
        fill="#9BAAB8"
        text-anchor="middle">VERDICT</text>

  <!-- Value text -->
  <text x="115" y="25"
        font-family="'JetBrains Mono', monospace"
        font-size="11"
        font-weight="700"
        letter-spacing="1"
        fill="#00E57A"
        text-anchor="middle">VERIFIED</text>
</svg>
